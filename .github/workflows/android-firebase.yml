name: Build and Upload to Firebase

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: gradle/actions/setup-gradle@v3

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Upload to Firebase App Distribution
        run: |
          firebase appdistribution:distribute app/build/outputs/apk/release/app-release-unsigned.apk \
          --app 1:997871715639:android:8c0d3fac56eff27d9cc6b2 \
          --release-notes "${{ github.event.head_commit.message }}" \
          --token ${{ secrets.FIREBASE_TOKEN }}

